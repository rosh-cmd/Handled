<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Consistency Audit | Handled Studio</title>
  <meta name="description" content="Find out how consistent your brand really is. A free 2-minute audit from Handled Studio." />
  <meta property="og:title" content="Brand Consistency Audit — Handled Studio" />
  <meta property="og:description" content="Seven questions. Instant score. Find out where your design is breaking down." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #1E3D51;
      --green: #69DE5F;
      --gold:  #F4C85A;
      --bg:    #F3F0EA;
      --white: #ffffff;
      --red:   #E05252;
      --amber: #F4A94A;
      --font:  'DM Sans', system-ui, sans-serif;
      --radius: 14px;
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.25rem 2rem;
    }

    /* ── PROGRESS BAR ── */
    .prog-track {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(30,61,81,0.08);
      z-index: 200;
      transition: opacity 0.4s;
    }
    .prog-track.hidden { opacity: 0; pointer-events: none; }
    .prog-fill {
      height: 100%;
      background: var(--green);
      border-radius: 0 2px 2px 0;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
    }
    .brand-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--navy);
    }
    .brand-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 24px rgba(30,61,81,0.07), 0 8px 48px rgba(30,61,81,0.05);
      overflow: hidden;
      position: relative;
    }

    /* Top accent strip */
    .card-accent {
      height: 4px;
      background: rgba(30,61,81,0.08);
      transition: background 0.4s;
    }
    .card-accent.red   { background: var(--red); }
    .card-accent.amber { background: var(--gold); }
    .card-accent.green { background: var(--green); }

    .card-body {
      padding: clamp(1.75rem, 6vw, 2.75rem);
    }

    /* ── STAGE TRANSITIONS ── */
    .stage {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .stage.active  { display: block; }
    .stage.visible { opacity: 1; transform: translateY(0); }

    /* ── QUIZ ── */
    .q-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .q-counter {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(30,61,81,0.4);
    }
    .q-pip-row {
      display: flex;
      gap: 5px;
    }
    .q-pip {
      width: 20px; height: 4px;
      border-radius: 2px;
      background: rgba(30,61,81,0.1);
      transition: background 0.3s;
    }
    .q-pip.done { background: var(--green); }
    .q-pip.active { background: rgba(105,222,95,0.45); }

    .q-text {
      font-size: clamp(1.1rem, 2.8vw, 1.35rem);
      font-weight: 600;
      line-height: 1.4;
      color: var(--navy);
      margin-bottom: 1.75rem;
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .q-opt {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.9rem 1.1rem;
      border: 1.5px solid rgba(30,61,81,0.12);
      border-radius: 9px;
      cursor: pointer;
      background: transparent;
      text-align: left;
      font-family: var(--font);
      font-size: 0.93rem;
      font-weight: 400;
      color: var(--navy);
      width: 100%;
      transition: border-color 0.18s, background 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .q-opt:hover {
      border-color: rgba(105,222,95,0.6);
      background: rgba(105,222,95,0.05);
    }
    .q-opt.chosen {
      border-color: var(--green);
      background: rgba(105,222,95,0.1);
    }
    .q-radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(30,61,81,0.2);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: border-color 0.18s, background 0.18s;
    }
    .q-opt.chosen .q-radio {
      border-color: var(--green);
      background: var(--green);
    }
    .q-radio-inner {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--navy);
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.18s, transform 0.18s;
    }
    .q-opt.chosen .q-radio-inner {
      opacity: 1;
      transform: scale(1);
    }
    .q-opt-text { flex: 1; line-height: 1.4; }

    /* ── GATE ── */
    .gate-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(30,61,81,0.4);
      margin-bottom: 0.9rem;
    }
    .gate-headline {
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--navy);
      margin-bottom: 0.65rem;
    }
    .gate-sub {
      font-size: 0.93rem;
      color: rgba(30,61,81,0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .gate-form {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .gate-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid rgba(30,61,81,0.15);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 1rem;
      color: var(--navy);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .gate-input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(30,61,81,0.07);
    }
    .gate-input::placeholder { color: rgba(30,61,81,0.3); }
    .gate-input.error { border-color: var(--red); }

    .gate-btn {
      padding: 0.88rem 1.5rem;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
    }
    .gate-btn:hover:not(:disabled) {
      background: #162d3d;
      transform: translateY(-1px);
    }
    .gate-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .gate-reassure {
      font-size: 0.76rem;
      color: rgba(30,61,81,0.38);
      text-align: center;
    }

    /* ── RESULT ── */
    .result-score-row {
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      margin-bottom: 1.1rem;
    }
    .result-num {
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--navy);
      letter-spacing: -0.02em;
    }
    .result-denom {
      font-size: 1.15rem;
      color: rgba(30,61,81,0.38);
      font-weight: 500;
      align-self: flex-end;
      padding-bottom: 0.6rem;
    }
    .result-pill {
      display: inline-block;
      padding: 0.28em 0.8em;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }
    .result-pill.red   { background: rgba(224,82,82,0.1);  color: #bc2c2c; }
    .result-pill.amber { background: rgba(244,169,74,0.15); color: #8f5a00; }
    .result-pill.green { background: rgba(105,222,95,0.18); color: #1f7a17; }

    .result-name {
      font-size: clamp(1.5rem, 4.5vw, 2rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--navy);
      margin-bottom: 0.9rem;
    }
    .result-desc {
      font-size: 0.95rem;
      color: rgba(30,61,81,0.68);
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }
    .result-rule {
      height: 1px;
      background: rgba(30,61,81,0.08);
      margin-bottom: 1.5rem;
    }
    .result-next-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(30,61,81,0.38);
      margin-bottom: 0.6rem;
    }
    .result-cta-text {
      font-size: 0.93rem;
      color: rgba(30,61,81,0.7);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }
    .result-btn {
      display: inline-block;
      padding: 0.88rem 1.75rem;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .result-btn:hover {
      background: #162d3d;
      transform: translateY(-1px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding-top: 4.5rem; padding-bottom: 1.5rem; justify-content: flex-start; }
      .q-pip-row { display: none; }
    }
  </style>
</head>
<body>

  <div class="prog-track hidden" id="progTrack">
    <div class="prog-fill" id="progFill" style="width:0%"></div>
  </div>

  <div class="top-bar">
    <a href="index.html" class="brand-link">
      <span class="brand-dot"></span>
      <span class="brand-name">Handled.Studio</span>
    </a>
  </div>

  <div class="card" id="auditCard">
    <div class="card-accent" id="cardAccent"></div>
    <div class="card-body">

      <!-- STAGE 1: QUIZ -->
      <div class="stage" id="stageQuiz">
        <div class="q-meta">
          <span class="q-counter" id="qCounter">Question 1 of 7</span>
          <div class="q-pip-row" id="qPips"></div>
        </div>
        <p class="q-text" id="qText"></p>
        <div class="q-options" id="qOptions"></div>
      </div>

      <!-- STAGE 2: GATE -->
      <div class="stage" id="stageGate">
        <p class="gate-eyebrow">Audit complete</p>
        <h2 class="gate-headline">Your result is ready.</h2>
        <p class="gate-sub">Enter your email to see your brand consistency score and what it means for your business.</p>
        <form class="gate-form" id="gateForm" novalidate>
          <input
            type="email"
            class="gate-input"
            id="emailInput"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
          <button type="submit" class="gate-btn" id="gateBtn">See my result</button>
          <p class="gate-reassure">No spam. Just your result and what it means.</p>
        </form>
      </div>

      <!-- STAGE 3: RESULT -->
      <div class="stage" id="stageResult">
        <div class="result-score-row">
          <span class="result-num" id="rNum"></span>
          <span class="result-denom">/ 21</span>
        </div>
        <span class="result-pill" id="rPill"></span>
        <h2 class="result-name" id="rName"></h2>
        <p class="result-desc" id="rDesc"></p>
        <div class="result-rule"></div>
        <p class="result-next-label">Next step</p>
        <p class="result-cta-text" id="rCta"></p>
        <a href="rundown.html" class="result-btn">Book a Rundown</a>
      </div>

    </div>
  </div>

  <script>
    'use strict';

    // ── DATA ────────────────────────────────────────────────────────────────

    const QUESTIONS = [
      {
        text: "When something goes out — a listing, proposal, or social post — how consistent does it look with your other marketing?",
        options: ["Almost never consistent", "Sometimes consistent", "Almost always consistent"]
      },
      {
        text: "Who is responsible for making sure design looks right before it leaves your business?",
        options: ["No one really owns it", "Whoever has time picks it up", "One person owns it consistently"]
      },
      {
        text: "How often do you find yourself fixing or adjusting design work before it goes out?",
        options: ["Regularly — it's become normal", "Occasionally", "Rarely or never"]
      },
      {
        text: "How would you describe your current design setup?",
        options: ["Freelancers we re-brief each time", "A mix of tools and people with no real system", "A consistent process that works"]
      },
      {
        text: "How long does it typically take to get a piece of design turned around?",
        options: ["Varies wildly and causes delays", "Sometimes slower than we'd like", "Reliably fast and predictable"]
      },
      {
        text: "How confident are you that your brand looks consistent across website, signage, social, and documents?",
        options: ["Not confident — varies a lot", "Somewhat consistent but not tight", "Very consistent across everything"]
      },
      {
        text: "When your business gets busy, what happens to your design output?",
        options: ["Things go out wrong or not at all", "Quality dips and things slow down", "The system holds up under pressure"]
      }
    ];

    const BANDS = [
      {
        range: [7, 11],
        key: 'red',
        label: 'Flat out',
        name: 'Flat out',
        desc: "Your design is reactive and nobody really owns it. Things are going out inconsistently — and it's probably costing you more than you realise in time, rework, and how your brand lands with clients.",
        cta: "Book a free Rundown call — we'll show you exactly where it's breaking down and what to do about it."
      },
      {
        range: [12, 16],
        key: 'amber',
        label: 'Patchy',
        name: 'Patchy',
        desc: "Some things work, others don't. You've got parts of a system but they're not joined up yet. The inconsistency is noticeable and it's holding your brand back from landing the way it should.",
        cta: "A 30-day pilot could sort this — real output, no long-term commitment."
      },
      {
        range: [17, 21],
        key: 'green',
        label: 'Sorted',
        name: 'Sorted',
        desc: "Your setup is mostly working. Design goes out consistently and your brand holds together well. The goal now is making sure that holds as your output grows and your business scales.",
        cta: "Let's make sure it holds as you grow."
      }
    ];

    // Replace with your Formspree form ID once set up at formspree.io
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID';

    // ── STATE ────────────────────────────────────────────────────────────────

    let currentQ = 0;
    const scores = [];

    // ── ELEMENTS ─────────────────────────────────────────────────────────────

    const progTrack  = document.getElementById('progTrack');
    const progFill   = document.getElementById('progFill');
    const cardAccent = document.getElementById('cardAccent');

    const stageQuiz   = document.getElementById('stageQuiz');
    const stageGate   = document.getElementById('stageGate');
    const stageResult = document.getElementById('stageResult');

    const ALL_STAGES = [stageQuiz, stageGate, stageResult];

    // ── HELPERS ──────────────────────────────────────────────────────────────

    function showStage(stage) {
      ALL_STAGES.forEach(s => { s.classList.remove('active', 'visible'); });
      stage.classList.add('active');
      // double-rAF ensures paint before class add so CSS transition fires
      requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('visible')));
    }

    function fadeOutThen(el, cb) {
      el.classList.remove('visible');
      setTimeout(cb, 280);
    }

    function setProgress(answered) {
      const pct = Math.round((answered / QUESTIONS.length) * 100);
      progFill.style.width = pct + '%';
    }

    function buildPips() {
      const row = document.getElementById('qPips');
      row.innerHTML = '';
      for (let i = 0; i < QUESTIONS.length; i++) {
        const pip = document.createElement('span');
        pip.className = 'q-pip';
        row.appendChild(pip);
      }
    }

    function updatePips() {
      const pips = document.querySelectorAll('.q-pip');
      pips.forEach((pip, i) => {
        pip.classList.remove('done', 'active');
        if (i < currentQ)      pip.classList.add('done');
        else if (i === currentQ) pip.classList.add('active');
      });
    }

    // ── QUIZ ─────────────────────────────────────────────────────────────────

    function renderQuestion() {
      const q = QUESTIONS[currentQ];
      document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
      document.getElementById('qText').textContent = q.text;

      const opts = document.getElementById('qOptions');
      opts.innerHTML = '';

      q.options.forEach((label, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'q-opt';
        btn.innerHTML =
          `<span class="q-radio"><span class="q-radio-inner"></span></span>` +
          `<span class="q-opt-text">${label}</span>`;
        btn.addEventListener('click', () => handleAnswer(btn, i + 1), { once: true });
        opts.appendChild(btn);
      });

      updatePips();
      setProgress(currentQ);
    }

    function handleAnswer(btn, score) {
      // Freeze all options
      document.querySelectorAll('.q-opt').forEach(b => (b.style.pointerEvents = 'none'));
      btn.classList.add('chosen');
      scores.push(score);

      const NEXT_DELAY = 420;

      if (currentQ < QUESTIONS.length - 1) {
        setTimeout(() => {
          fadeOutThen(stageQuiz, () => {
            currentQ++;
            renderQuestion();
            requestAnimationFrame(() => requestAnimationFrame(() => stageQuiz.classList.add('visible')));
          });
        }, NEXT_DELAY);
      } else {
        // Final question answered
        setTimeout(() => {
          setProgress(QUESTIONS.length);
          setTimeout(() => {
            progTrack.classList.add('hidden');
            showStage(stageGate);
          }, 350);
        }, NEXT_DELAY);
      }
    }

    // ── GATE ─────────────────────────────────────────────────────────────────

    document.getElementById('gateForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const emailEl = document.getElementById('emailInput');
      const btn     = document.getElementById('gateBtn');
      const email   = emailEl.value.trim();

      // Basic validation
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      if (!valid) {
        emailEl.classList.add('error');
        emailEl.focus();
        emailEl.addEventListener('input', () => emailEl.classList.remove('error'), { once: true });
        return;
      }

      btn.textContent = 'Loading…';
      btn.disabled = true;

      const total = scores.reduce((a, b) => a + b, 0);
      const band  = BANDS.find(b => total >= b.range[0] && total <= b.range[1]);

      // Submit to Formspree — non-blocking, show result regardless
      try {
        await fetch(FORMSPREE_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            email,
            score: `${total} / 21`,
            band: band ? band.label : '—',
            q1: scores[0], q2: scores[1], q3: scores[2],
            q4: scores[3], q5: scores[4], q6: scores[5], q7: scores[6]
          })
        });
      } catch (_) {
        // Fail silently — always reveal result
      }

      renderResult(total, band);
    });

    // ── RESULT ───────────────────────────────────────────────────────────────

    function renderResult(total, band) {
      // Accent strip
      cardAccent.className = 'card-accent ' + (band ? band.key : '');

      document.getElementById('rNum').textContent  = total;

      const pill = document.getElementById('rPill');
      pill.textContent  = band ? band.label : '—';
      pill.className    = 'result-pill ' + (band ? band.key : '');

      document.getElementById('rName').textContent = band ? band.name : '—';
      document.getElementById('rDesc').textContent = band ? band.desc : '—';
      document.getElementById('rCta').textContent  = band ? band.cta  : '—';

      showStage(stageResult);
    }

    // ── INIT ─────────────────────────────────────────────────────────────────

    buildPips();
    progTrack.classList.remove('hidden');
    showStage(stageQuiz);
    renderQuestion();

  </script>
</body>
</html>
